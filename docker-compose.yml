x-ondemand-common: &ondemand-common
  build:
    context: .
    dockerfile: Dockerfile.dev
    args:
      USER: ${OOD_DEV_USER:-ooddev}
      UID: ${OOD_DEV_UID:-1000}
      GID: ${OOD_DEV_GID:-1000}
  hostname: localhost
  cgroup: host
  pid: host
  privileged: true
  tmpfs:
    - /run
    - /run/lock
    - /tmp
  volumes:
    - /sys/fs/cgroup:/sys/fs/cgroup:ro
    - ./docker/public/index.html:/var/www/ood/public/index.html:ro
    - ./ood-portal-generator/share/need_auth.html:/var/www/ood/public/need_auth.html:ro
    - ./ood-portal-generator/share/maintenance.html:/var/www/ood/public/maintenance/index.html:ro
    - ./packaging/files/logo.png:/var/www/ood/public/logo.png:ro
    - ./packaging/files/favicon.ico:/var/www/ood/public/favicon.ico:ro
    - ./apps/dashboard:/var/www/ood/apps/sys/dashboard
    - ./apps/myjobs:/var/www/ood/apps/sys/myjobs
    - ./apps/shell:/var/www/ood/apps/sys/shell
    - ./apps/bc_desktop:/var/www/ood/apps/sys/bc_desktop
    - ./nginx_stage:/opt/ood/nginx_stage
    - ./docker/host-slurm:/usr/local/host-slurm:ro
    - ./docker/start-ondemand.sh:/usr/local/bin/start-ondemand.sh:ro
    - ./docker/bin/ondemand-dex:/usr/sbin/ondemand-dex:ro
    - /etc/slurm:/etc/slurm:ro
    - /opt/hpc/slurm:/opt/hpc/slurm:ro
    - /opt/hpc/slurm-25.05.3:/opt/hpc/slurm-25.05.3:ro
    - /run/munge:/run/munge
    - ./:/workspace/ondemand
  working_dir: /workspace/ondemand
  command: ["/usr/local/bin/start-ondemand.sh"]

services:
  ondemand-prod:
    <<: *ondemand-common
    container_name: ${OOD_PROD_CONTAINER_NAME:-ondemand-prod}
    environment:
      container: docker
      OOD_CONTAINER_USER: ${OOD_DEV_USER:-ooddev}
      OOD_AUTH_MODE: ntu-sso
      OOD_DEX_CLIENT_SECRET: ${OOD_DEX_CLIENT_SECRET:-}
      OOD_ENABLE_SLURM: ${OOD_ENABLE_SLURM:-false}
      OOD_SLURM_CLUSTER_ID: ${OOD_SLURM_CLUSTER_ID:-eecorehpc}
      OOD_SLURM_CLUSTER_TITLE: ${OOD_SLURM_CLUSTER_TITLE:-EE Core HPC}
      OOD_SLURM_CLUSTER_NAME: ${OOD_SLURM_CLUSTER_NAME:-}
      OOD_SLURM_LOGIN_HOST: ${OOD_SLURM_LOGIN_HOST:-eecorehpc.ee.ntu.edu.tw}
      OOD_SLURM_SUBMIT_HOST: ${OOD_SLURM_SUBMIT_HOST-}
      OOD_SLURM_BIN: ${OOD_SLURM_BIN:-/opt/hpc/slurm/bin}
      OOD_SLURM_CONF: ${OOD_SLURM_CONF:-/etc/slurm/slurm.conf}
      OOD_SLURM_VNC_MODULE: ${OOD_SLURM_VNC_MODULE:-ondemand-vnc}
    ports:
      - "${OOD_PROD_HTTP_PORT:-18080}:18080"
      - "${OOD_PROD_DEX_PORT:-15556}:5556"

  ondemand-dev:
    <<: *ondemand-common
    profiles: ["dev"]
    container_name: ${OOD_DEV_CONTAINER_NAME:-ondemand-dev}
    environment:
      container: docker
      OOD_CONTAINER_USER: ${OOD_DEV_USER:-ooddev}
      OOD_AUTH_MODE: local
      OOD_LOCAL_BASE_URL: ${OOD_LOCAL_BASE_URL:-http://localhost:18081}
      OOD_LOCAL_HTTP_PORT: ${OOD_LOCAL_HTTP_PORT:-18081}
      OOD_LOCAL_DEX_CLIENT_SECRET: ${OOD_LOCAL_DEX_CLIENT_SECRET:-}
      OOD_LOCAL_PASSWORD: ${OOD_LOCAL_PASSWORD:-}
      OOD_LOCAL_PASSWORD_HASH: ${OOD_LOCAL_PASSWORD_HASH:-}
      OOD_LOCAL_USER_ID: ${OOD_LOCAL_USER_ID:-}
      OOD_ENABLE_SLURM: ${OOD_ENABLE_SLURM:-false}
      OOD_SLURM_CLUSTER_ID: ${OOD_SLURM_CLUSTER_ID:-eecorehpc}
      OOD_SLURM_CLUSTER_TITLE: ${OOD_SLURM_CLUSTER_TITLE:-EE Core HPC}
      OOD_SLURM_CLUSTER_NAME: ${OOD_SLURM_CLUSTER_NAME:-}
      OOD_SLURM_LOGIN_HOST: ${OOD_SLURM_LOGIN_HOST:-eecorehpc.ee.ntu.edu.tw}
      OOD_SLURM_SUBMIT_HOST: ${OOD_SLURM_SUBMIT_HOST-}
      OOD_SLURM_BIN: ${OOD_SLURM_BIN:-/opt/hpc/slurm/bin}
      OOD_SLURM_CONF: ${OOD_SLURM_CONF:-/etc/slurm/slurm.conf}
      OOD_SLURM_VNC_MODULE: ${OOD_SLURM_VNC_MODULE:-ondemand-vnc}
    ports:
      - "${OOD_DEV_HTTP_PORT:-18081}:18080"
      - "${OOD_DEV_DEX_PORT:-15557}:5556"
